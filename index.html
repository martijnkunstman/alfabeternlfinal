<!DOCTYPE html>
<html lang="nl">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Alfabeter</title>
    <link rel="icon" type="image/png" href="icon.png" sizes="any">
    <link rel="icon" href="icon.svg" type="image/svg+xml">
    <link rel="apple-touch-icon" href="icon.png">
    <meta name="keywords"
        content="alfabeter, lezen, netnieuws, analfabeten, analfabeet, analfabetisme, educatie, educatieve webapplicaties, gratis, leren lezen, nieuws, laaggeletterdheid, taalontwikkeling, digitale geletterdheid, alfabetisering, leesvaardigheid, taalvaardigheid, educatieve tools, online leren, educatieve apps, taalonderwijs, leesonderwijs, digitale educatie">
    <meta name="description"
        content="Maak gratis gebruik van Alfabeter Lezen en Netnieuws. Twee educatieve webapplicaties voor analfabeten.">
    <link rel="stylesheet" href="style.css">
    <meta name="theme-color" content="#fafafa">
</head>

<body>
    <div id="screen-front" class="screen">
        <div class="front-content">
            <div class="audio-buttons">
                <button id="audio-btn" class="icon-btn" aria-label="Lees de tekst voor" type="button">
                    <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
                        <path d="M3 9v6h4l5 5V4L7 9H3z" />
                        <path class="audio-wave" d="M16.5 12c0-1.77-.77-3.29-2-4.36v8.72c1.23-1.07 2-2.59 2-4.36z" />
                        <path class="audio-wave"
                            d="M14.5 3.23v2.06c2.89 1.2 5 4.03 5 7.71s-2.11 6.51-5 7.71v2.06c4.01-1.28 7-5.02 7-9.77s-2.99-8.49-7-9.77z" />
                    </svg>
                </button>
                <button style="display:none;" id="audio-btn-hd" class="icon-btn"
                    aria-label="Lees de tekst voor (andere stem)" type="button">
                    <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
                        <path d="M3 9v6h4l5 5V4L7 9H3z" />
                        <path class="audio-wave" d="M16.5 12c0-1.77-.77-3.29-2-4.36v8.72c1.23-1.07 2-2.59 2-4.36z" />
                        <path class="audio-wave"
                            d="M14.5 3.23v2.06c2.89 1.2 5 4.03 5 7.71s-2.11 6.51-5 7.71v2.06c4.01-1.28 7-5.02 7-9.77s-2.99-8.49-7-9.77z" />
                    </svg>
                </button>
            </div>
            <p id="front-text"><span class="word" data-i="0">Na</span> <span class="word" data-i="1">de</span> <span
                    class="word" data-i="2">zomervakantie</span> <span class="word" data-i="3">van</span> <span
                    class="word" data-i="4">2026</span> <span class="word" data-i="5">bieden</span> <span class="word"
                    data-i="6">we</span> <span class="word" data-i="7">alleen</span> <span class="word"
                    data-i="8">nog</span> <span class="word" data-i="9">de</span> <span class="word"
                    data-i="10">onderstaande</span> <span class="word" data-i="11">twee</span> <span class="word"
                    data-i="12">programma's</span> <span class="word" data-i="13">aan,</span> <b><span class="word"
                        data-i="14">gratis</span></b> <span class="word" data-i="15">en</span> <b><span class="word"
                        data-i="16">zonder</span> <span class="word" data-i="17">inlog:</span></b> <br><b><span
                        class="word" data-i="18">Alfabeter</span> <span class="word" data-i="19">Lezen</span></b> <span
                    class="word" data-i="20">voor</span> <span class="word" data-i="21">beginnende</span> <span
                    class="word" data-i="22">lezers</span><br><b><span class="word" data-i="23">Netnieuws</span></b>
                <span class="word" data-i="24">voor</span> <span class="word" data-i="25">mensen</span> <span
                    class="word" data-i="26">die</span> <span class="word" data-i="27">al</span> <span class="word"
                    data-i="28">wat</span> <span class="word" data-i="29">beter</span> <span class="word"
                    data-i="30">lezen</span>
            </p>
            <button id="next-btn" class="icon-btn arrow-btn" aria-label="Ga verder" type="button">
                <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
                    <path d="M8 5l8 7-8 7V5z" />
                </svg>
            </button>
        </div>
    </div>

    <div id="screen-apps" class="screen hidden">
        <div id="main">
            <div id="apps">
                <div id="lezen">
                    <div id="lezen-app">
                        <a href="https://www.alfabeter.nl/lezen">
                            <div class="container-app" id="app-btn-lezen">
                                <img class="link" src="start_lezen.png" alt="Lezen Logo" class="lezen-logo">
                                <div class="play-overlay">
                                    <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
                                        <path d="M8 5v14l11-7z" />
                                    </svg>
                                </div>
                            </div>
                        </a>
                    </div>
                    <div class="containers-smaller">


                        <div class="link" id="underlayvideo1">
                            <div class="container-video">
                                <img src="video_overlay.png">
                            </div>
                        </div>
                        <div class="link" id="underlayvideo2">
                            <div class="container-video">
                                <img src="video_overlay.png">
                            </div>
                        </div>
                    </div>

                </div>
                <div id="netnieuws">
                    <div id="netnieuws-app">
                        <a href="https://www.alfabeter.nl/netnieuws">
                            <div class="container-app" id="app-btn-netnieuws">
                                <img class="link" src="start_netnieuws.png" alt="Netnieuws Logo" class="netnieuws-logo">
                                <div class="play-overlay">
                                    <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
                                        <path d="M8 5v14l11-7z" />
                                    </svg>
                                </div>
                            </div>
                        </a>
                    </div>
                    <div class="containers-smaller">
                        <div class="link" id="underlayvideo3">
                            <div class="container-video">
                                <img src="video_overlay.png">
                            </div>
                        </div>
                        <div class="link" id="underlayvideo4">
                            <div class="container-video">
                                <img src="video_overlay.png">
                            </div>
                        </div>
                    </div>
                </div>

            </div>
            <div id="extra">
                <div id="info">
                    <div class="container-video">
                        <img class="link" src="info.png">
                    </div>
                </div>
            </div>
        </div>
    </div>

    <div id="video-modal" class="video-modal hidden">
        <video id="video-modal-player" controls playsinline autoplay></video>
        <button id="video-modal-close" class="video-modal-close" aria-label="Sluiten" type="button">
            <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
                <path d="M6 6l12 12M18 6L6 18" stroke="#000000" stroke-width="2.5" stroke-linecap="round" />
            </svg>
        </button>
    </div>

    <script src="app.js"></script>
</body>

</html>
